services:
  # Backend Service
  - type: web
    name: college-complaint-backend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false # You will provide this in the Render dashboard
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE
        value: 7d
      - key: CORS_ORIGIN
        fromService:
          type: static
          name: college-complaint-frontend
          property: url

  # Frontend Service
  - type: static_site
    name: college-complaint-frontend
    env: static
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    publishPath: frontend/dist
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: college-complaint-backend
          property: url
    routes:
      - type: rewrite
        src: /*
        dest: /index.html

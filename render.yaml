services:
  - type: web
    name: college-complaint-system
    env: node
    plan: free
    # Build both frontend and backend
    buildCommand: npm install && cd frontend && npm install && npm run build
    # Start the backend (which now serves the frontend)
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE
        value: 7d
      - key: VITE_API_BASE_URL
        value: "" # Leave empty so it uses the same domain
